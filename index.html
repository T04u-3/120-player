<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YDS-120 Web MIDI Player</title>

<style>
body{
  font-family: sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px auto;
  max-width:600px;
}
</style>
</head>

<body>
<h1>🎷 YDS-120 Web Player</h1>
<p>USB接続したYDS-120をブラウザで鳴らすテスト</p>

<div class="card">
  <button onclick="connectMIDI()">MIDI接続</button>
  <button onclick="testSound()">テスト音</button>
</div>

<div class="card">
  <h3>現在の音</h3>
  <p id="note">未接続</p>
</div>

<script>
let midiAccess;
let input;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let activeNotes = {};
let breath = 0; // CC2

function midiToFreq(note){
  return 440 * Math.pow(2, (note - 69) / 12);
}

/* サックス倍音 */
function createSaxWave(){
  const real = new Float32Array([
    0,
    1,
    0.9,
    0.7,
    0.5,
    0.3,
    0.2,
    0.1
  ]);
  const imag = new Float32Array(real.length);
  return audioCtx.createPeriodicWave(real, imag);
}

const saxWave = createSaxWave();

/* ノイズ */
function createNoiseBuffer(){
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i] = Math.random()*2-1;
  }
  return buffer;
}

const noiseBuffer = createNoiseBuffer();

function playFreq(note, velocity){

  if(activeNotes[note]) return;

  const freq = midiToFreq(note);

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();

  const vibratoOsc = audioCtx.createOscillator();
  const vibratoGain = audioCtx.createGain();

  osc.setPeriodicWave(saxWave);
  osc.frequency.value = freq;

  /* ビブラート */
  vibratoOsc.frequency.value = 5.3;
  vibratoGain.gain.value = 4;
  vibratoOsc.connect(vibratoGain);
  vibratoGain.connect(osc.frequency);

  /* フィルター */
  filter.type="lowpass";
  filter.frequency.value = 2000;
  filter.Q.value = 6;

  /* ノイズ */
  noise.buffer = noiseBuffer;
  noise.loop = true;
  noiseGain.gain.value = 0.02;

  /* 初期音量 */
  gain.gain.value = 0;

  osc.connect(filter);
  noise.connect(noiseGain);

  noiseGain.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  noise.start();
  vibratoOsc.start();

  activeNotes[note] = {
    osc,
    gain,
    filter,
    noiseGain,
    vibratoOsc
  };
}

/* ブレス制御 */
function updateBreath(value){

  breath = value / 127;

  Object.values(activeNotes).forEach(n=>{

    const vol = breath * 0.9;

    n.gain.gain.setTargetAtTime(
      vol,
      audioCtx.currentTime,
      0.02
    );

    const cutoff =
      800 + breath * 5000;

    n.filter.frequency.setTargetAtTime(
      cutoff,
      audioCtx.currentTime,
      0.02
    );

    const noiseLevel =
      breath * 0.03;

    n.noiseGain.gain.setTargetAtTime(
      noiseLevel,
      audioCtx.currentTime,
      0.02
    );

  });
}

function stopFreq(note){

  if(activeNotes[note]){

    const n = activeNotes[note];

    n.gain.gain.setTargetAtTime(
      0,
      audioCtx.currentTime,
      0.1
    );

    setTimeout(()=>{
      n.osc.stop();
      n.vibratoOsc.stop();
      delete activeNotes[note];
    },300);

  }
}

async function connectMIDI(){

  try{

    midiAccess =
      await navigator.requestMIDIAccess();

    const inputs =
      midiAccess.inputs.values();

    for(let i of inputs){
      input = i;
      break;
    }

    if(input){
      input.onmidimessage =
        handleMIDI;

      document.getElementById("note")
      .innerText="接続成功";
    }

  }catch(e){
    alert("MIDI接続失敗");
  }

}

function handleMIDI(msg){

  const [status, data1, data2] =
    msg.data;

  const command =
    status & 0xf0;

  /* Note On */
  if(command === 0x90 && data2>0){

    playFreq(data1,data2);

    document.getElementById("note")
      .innerText =
      `Note:${data1} Breath:${Math.round(breath*127)}`;
  }

  /* Note Off */
  if(command === 0x80 ||
     (command===0x90 && data2===0)){

    stopFreq(data1);
  }

  /* CC */
  if(command === 0xB0){

    if(data1 === 2){ // CC2 breath
      updateBreath(data2);
    }

  }

}

function testSound(){

  playFreq(69,100);

  let b=0;

  const i=setInterval(()=>{

    updateBreath(b);

    b+=5;

    if(b>120){
      clearInterval(i);
      stopFreq(69);
    }

  },40);

}
</script>

</body>
</html>
