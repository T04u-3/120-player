<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YDS-120 Web MIDI Player</title>

<style>
body{
  font-family: sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px auto;
  max-width:600px;
}
</style>
</head>

<body>
<h1>🎷 YDS-120 Web Player</h1>
<p>USB接続したYDS-120をブラウザで鳴らすテスト</p>

<div class="card">
  <button onclick="connectMIDI()">MIDI接続</button>
  <button onclick="testSound()">テスト音</button>
</div>

<div class="card">
  <h3>現在の音</h3>
  <p id="note">未接続</p>
</div>

<script>
let midiAccess;
let input;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let activeNotes = {};

function midiToFreq(note){
  return 440 * Math.pow(2, (note - 69) / 12);
}

function createSaxWave(){
  const real = new Float32Array([0,1,0.6,0.4,0.2,0.1]);
  const imag = new Float32Array(real.length);
  return audioCtx.createPeriodicWave(real, imag);
}

const saxWave = createSaxWave();

function playFreq(note, velocity){
  if(activeNotes[note]) return;

  const freq = midiToFreq(note);

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.setPeriodicWave(saxWave);
  osc.frequency.value = freq;

  gain.gain.value = (velocity / 127) * 0.02;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  activeNotes[note] = {osc, gain};
}

function stopFreq(note){
  if(activeNotes[note]){
    activeNotes[note].osc.stop();
    delete activeNotes[note];
  }
}

async function connectMIDI(){
  try{
    midiAccess = await navigator.requestMIDIAccess();

    const inputs = midiAccess.inputs.values();

    for(let i of inputs){
      input = i;
      break;
    }

    if(input){
      input.onmidimessage = handleMIDI;
      document.getElementById("note").innerText = "接続成功";
    }

  }catch(e){
    alert("MIDI接続失敗");
  }
}

function handleMIDI(msg){
  const [status, note, velocity] = msg.data;

  if(status === 144 && velocity > 0){
    playFreq(note, velocity);

    document.getElementById("note").innerText =
      `Note: ${note} Velocity: ${velocity}`;
  }

  if(status === 128 || (status === 144 && velocity === 0)){
    stopFreq(note);
  }
}

function testSound(){
  playFreq(69,100);
  setTimeout(()=>stopFreq(69),500);
}
</script>

</body>
</html>
