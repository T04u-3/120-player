<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YDS Sax Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎷 YDS Sax Trainer</h1>

<button id="connect">MIDI接続</button>

<div class="panel">

<div class="meter">
<div id="level"></div>
</div>

<div class="note">
現在の音：<span id="note">---</span>
</div>

</div>

<div class="controls">

<label>リバーブ</label>
<input id="reverb" type="range" min="0" max="1" step="0.01" value="0.3">

<label>ブライトネス</label>
<input id="brightness" type="range" min="500" max="5000" value="2000">

</div>

</div>

<script src="app.js"></script>
</body>
</html>
