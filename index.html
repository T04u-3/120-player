<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YDS-120 Web MIDI Player</title>

<style>
body{
  font-family: sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px auto;
  max-width:600px;
}
</style>
</head>

<body>
<h1>🎷 YDS-120 Web Player</h1>
<p>USB接続したYDS-120をブラウザで鳴らすテスト</p>

<div class="card">
  <button onclick="connectMIDI()">MIDI接続</button>
  <button onclick="testSound()">テスト音</button>
</div>

<div class="card">
  <h3>現在の音</h3>
  <p id="note">未接続</p>
</div>

<script>
let midiAccess;
let input;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let activeNotes = {};

function midiToFreq(note){
  return 440 * Math.pow(2, (note - 69) / 12);
}

/* ===== サックス波形 ===== */
function createSaxWave(){
  const real = new Float32Array([0,1,0.8,0.5,0.3,0.2,0.1]);
  const imag = new Float32Array(real.length);
  return audioCtx.createPeriodicWave(real, imag);
}

const saxWave = createSaxWave();

/* ===== ノイズ生成（息感） ===== */
function createNoiseBuffer(){
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i] = Math.random()*2-1;
  }
  return buffer;
}

const noiseBuffer = createNoiseBuffer();

/* ===== 音を鳴らす ===== */
function playFreq(note, velocity){
  if(activeNotes[note]) return;

  const freq = midiToFreq(note);

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  /* ノイズ */
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();

  /* ビブラート */
  const vibratoOsc = audioCtx.createOscillator();
  const vibratoGain = audioCtx.createGain();

  osc.setPeriodicWave(saxWave);
  osc.frequency.value = freq;

  /* ビブラート設定 */
  vibratoOsc.frequency.value = 5.5;
  vibratoGain.gain.value = 6;
  vibratoOsc.connect(vibratoGain);
  vibratoGain.connect(osc.frequency);

  /* フィルタ */
  filter.type = "lowpass";
  filter.frequency.value = 3000;
  filter.Q.value = 5;

  /* ノイズ */
  noise.buffer = noiseBuffer;
  noise.loop = true;
  noiseGain.gain.value = 0.02;

  /* ADSR */
  const now = audioCtx.currentTime;
  const attack = 0.02;
  const decay = 0.1;
  const sustain = 0.7;

  const baseVol = 0.8 * (velocity / 127);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(baseVol, now + attack);
  gain.gain.linearRampToValueAtTime(baseVol * sustain, now + attack + decay);

  /* 接続 */
  osc.connect(filter);
  noise.connect(noiseGain);

  noiseGain.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  noise.start();
  vibratoOsc.start();

  activeNotes[note] = {
    osc,
    gain,
    noise,
    vibratoOsc
  };
}

/* ===== 音を止める ===== */
function stopFreq(note){
  if(activeNotes[note]){

    const n = activeNotes[note];
    const now = audioCtx.currentTime;

    n.gain.gain.cancelScheduledValues(now);
    n.gain.gain.setValueAtTime(n.gain.gain.value, now);
    n.gain.gain.linearRampToValueAtTime(0, now + 0.15);

    setTimeout(()=>{
      n.osc.stop();
      n.noise.stop();
      n.vibratoOsc.stop();
    },200);

    delete activeNotes[note];
  }
}

/* ===== MIDI接続 ===== */
async function connectMIDI(){
  try{
    midiAccess = await navigator.requestMIDIAccess();

    const inputs = midiAccess.inputs.values();

    for(let i of inputs){
      input = i;
      break;
    }

    if(input){
      input.onmidimessage = handleMIDI;
      document.getElementById("note").innerText = "接続成功";
    }

  }catch(e){
    alert("MIDI接続失敗");
  }
}

/* ===== MIDI処理 ===== */
function handleMIDI(msg){
  const [status, note, velocity] = msg.data;

  if(status === 144 && velocity > 0){
    playFreq(note, velocity);

    document.getElementById("note").innerText =
      `Note: ${note} Velocity: ${velocity}`;
  }

  if(status === 128 || (status === 144 && velocity === 0)){
    stopFreq(note);
  }
}

/* ===== テスト ===== */
function testSound(){
  playFreq(69,100);
  setTimeout(()=>stopFreq(69),800);
}
</script>

</body>
</html>
